name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gcc make

    - name: Build project (with -Werror)
      run: make CC=gcc CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"

    - name: Lint (syntax check)
      run: make lint CC=gcc CFLAGS="-std=c11 -Wall -Wextra -Wpedantic -Werror -O2"

    - name: Run tests
      run: make test CC=gcc

    - name: Verify build artifacts exist
      run: |
        test -f build/server || (echo "server binary not found" && exit 1)
        test -f build/client || (echo "client binary not found" && exit 1)
        echo "All build artifacts verified."

    - name: Clean build artifacts
      run: make clean
